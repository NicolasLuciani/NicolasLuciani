<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes slideIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

      @keyframes bar1 { from{width:0} to{width:164px} }
      @keyframes bar2 { from{width:0} to{width:120px} }
      @keyframes bar3 { from{width:0} to{width:110px} }
      @keyframes bar4 { from{width:0} to{width:80px} }
      @keyframes bar5 { from{width:0} to{width:140px} }
      @keyframes bar6 { from{width:0} to{width:160px} }

      .fade1  { animation: slideIn .4s ease both; animation-delay: 0.1s; opacity:0; }
      .fade2  { animation: slideIn .4s ease both; animation-delay: 0.4s; opacity:0; }
      .fade3  { animation: slideIn .4s ease both; animation-delay: 0.7s; opacity:0; }
      .fade4  { animation: slideIn .4s ease both; animation-delay: 1.0s; opacity:0; }
      .fade5  { animation: slideIn .4s ease both; animation-delay: 1.3s; opacity:0; }
      .fade6  { animation: slideIn .4s ease both; animation-delay: 1.6s; opacity:0; }
      .fade7  { animation: slideIn .4s ease both; animation-delay: 1.9s; opacity:0; }
      .fade8  { animation: slideIn .4s ease both; animation-delay: 2.2s; opacity:0; }
      .fade9  { animation: slideIn .4s ease both; animation-delay: 2.5s; opacity:0; }
      .fade10 { animation: slideIn .4s ease both; animation-delay: 2.8s; opacity:0; }
      .fade11 { animation: slideIn .4s ease both; animation-delay: 3.1s; opacity:0; }
      .fade12 { animation: slideIn .4s ease both; animation-delay: 3.4s; opacity:0; }
      .fade13 { animation: slideIn .4s ease both; animation-delay: 3.7s; opacity:0; }
      .fade14 { animation: slideIn .4s ease both; animation-delay: 4.0s; opacity:0; }
      .fade15 { animation: slideIn .4s ease both; animation-delay: 4.3s; opacity:0; }

      .cursor { animation: blink 1.1s step-end infinite; }
      .dot-pulse { animation: pulse 2s ease infinite; }

      .b1 { animation: bar1 .6s cubic-bezier(.4,0,.2,1) both; animation-delay: 2.0s; width:0; }
      .b2 { animation: bar2 .6s cubic-bezier(.4,0,.2,1) both; animation-delay: 2.3s; width:0; }
      .b3 { animation: bar3 .6s cubic-bezier(.4,0,.2,1) both; animation-delay: 2.6s; width:0; }
      .b4 { animation: bar4 .6s cubic-bezier(.4,0,.2,1) both; animation-delay: 2.9s; width:0; }
      .b5 { animation: bar5 .6s cubic-bezier(.4,0,.2,1) both; animation-delay: 3.2s; width:0; }
      .b6 { animation: bar6 .6s cubic-bezier(.4,0,.2,1) both; animation-delay: 3.5s; width:0; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#0d1117"/>

  <!-- Titlebar -->
  <rect width="800" height="44" rx="12" fill="#161b22"/>
  <rect y="32" width="800" height="12" fill="#161b22"/>
  <rect y="44" width="800" height="1" fill="#21262d"/>

  <!-- Traffic lights -->
  <circle cx="24" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="22" r="6" fill="#febc2e"/>
  <circle cx="64" cy="22" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="400" y="27" text-anchor="middle" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#484f58">nicolas@senai ~ zsh</text>

  <!-- Status badge -->
  <rect x="660" y="12" width="112" height="20" rx="10" fill="#0d1117" stroke="#1f6232" stroke-width="0.5"/>
  <circle cx="674" cy="22" r="4" fill="#3fb950" class="dot-pulse"/>
  <text x="684" y="26.5" font-family="SFMono-Regular,Consolas,monospace" font-size="10" fill="#3fb950">open to learn</text>

  <!-- LINE 1: prompt whoami -->
  <g class="fade1">
    <text x="28" y="82" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#3fb950">❯</text>
    <text x="46" y="82" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#e6edf3">whoami</text>
  </g>

  <!-- LINE 2: whoami output -->
  <g class="fade2">
    <text x="28" y="102" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#8b949e">→ </text>
    <text x="46" y="102" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#3fb950">Nicolas Luciani</text>
    <text x="178" y="102" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#8b949e"> · dev em formação · SENAI-SP · Vinhedo, BR</text>
  </g>

  <!-- LINE 3: prompt cat -->
  <g class="fade3">
    <text x="28" y="128" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#3fb950">❯</text>
    <text x="46" y="128" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#e6edf3">cat sobre.txt</text>
  </g>

  <!-- LINE 4-5: sobre output -->
  <g class="fade4">
    <text x="28" y="148" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#8b949e">→ Curioso e determinado — resolvo problemas com código</text>
    <text x="28" y="165" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#8b949e">  e busco criar soluções que impactem positivamente.</text>
  </g>

  <!-- LINE 6: prompt stack -->
  <g class="fade5">
    <text x="28" y="191" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#3fb950">❯</text>
    <text x="46" y="191" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#e6edf3">stack --progress</text>
  </g>

  <!-- SECTION: front-end -->
  <g class="fade6">
    <text x="28" y="215" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#30363d"># front-end</text>
  </g>

  <!-- HTML/CSS bar -->
  <g class="fade7">
    <text x="36" y="234" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#58a6ff">HTML/CSS</text>
    <rect x="138" y="223" height="10" rx="2" fill="#1f3a5c" width="200"/>
    <rect x="138" y="223" height="10" rx="2" fill="#58a6ff" class="b1"/>
    <text x="346" y="234" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#484f58">82%</text>
  </g>

  <!-- JavaScript bar -->
  <g class="fade8">
    <text x="36" y="254" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#e3b341">JavaScript</text>
    <rect x="138" y="243" height="10" rx="2" fill="#3a2e0e" width="200"/>
    <rect x="138" y="243" height="10" rx="2" fill="#e3b341" class="b2"/>
    <text x="346" y="254" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#484f58">60%</text>
  </g>

  <!-- SECTION: back-end -->
  <g class="fade9">
    <text x="28" y="275" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#30363d"># back-end</text>
  </g>

  <!-- Python bar -->
  <g class="fade10">
    <text x="36" y="294" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#3fb950">Python</text>
    <rect x="138" y="283" height="10" rx="2" fill="#0f2a1a" width="200"/>
    <rect x="138" y="283" height="10" rx="2" fill="#3fb950" class="b3"/>
    <text x="346" y="294" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#484f58">55%</text>
  </g>

  <!-- Dart bar -->
  <g class="fade11">
    <text x="36" y="314" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#bc8cff">Dart</text>
    <rect x="138" y="303" height="10" rx="2" fill="#1e1433" width="200"/>
    <rect x="138" y="303" height="10" rx="2" fill="#bc8cff" class="b4"/>
    <text x="346" y="314" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#484f58">40%</text>
  </g>

  <!-- SECTION: ferramentas -->
  <g class="fade12">
    <text x="28" y="335" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#30363d"># ferramentas</text>
  </g>

  <!-- Git bar -->
  <g class="fade13">
    <text x="36" y="354" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#f78166">Git</text>
    <rect x="138" y="343" height="10" rx="2" fill="#2d160f" width="200"/>
    <rect x="138" y="343" height="10" rx="2" fill="#f78166" class="b5"/>
    <text x="346" y="354" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#484f58">70%</text>
  </g>

  <!-- VS Code bar -->
  <g class="fade14">
    <text x="36" y="374" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#79c0ff">VS Code</text>
    <rect x="138" y="363" height="10" rx="2" fill="#0d2233" width="200"/>
    <rect x="138" y="363" height="10" rx="2" fill="#79c0ff" class="b6"/>
    <text x="346" y="374" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#484f58">80%</text>
  </g>

  <!-- Divider -->
  <rect x="28" y="392" width="744" height="0.5" fill="#21262d" class="fade14"/>

  <!-- git status -->
  <g class="fade15">
    <text x="28" y="416" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#3fb950">❯</text>
    <text x="46" y="416" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#e6edf3">git status</text>
    <text x="28" y="436" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#8b949e">On branch </text>
    <text x="108" y="436" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#3fb950">main</text>
    <text x="142" y="436" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#8b949e"> — construindo o futuro, um commit por vez.</text>
  </g>

  <!-- Final prompt + cursor -->
  <g class="fade15">
    <text x="28" y="462" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#3fb950">❯</text>
    <rect x="46" y="450" width="8" height="14" rx="1" fill="#3fb950" class="cursor"/>
  </g>

  <!-- Contact section right side -->
  <g class="fade9">
    <text x="430" y="215" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#30363d"># contato</text>
  </g>

  <!-- WhatsApp -->
  <g class="fade10">
    <rect x="430" y="222" width="340" height="34" rx="6" fill="#161b22" stroke="#1f6232" stroke-width="0.5"/>
    <text x="446" y="244" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#3fb950">wa</text>
    <text x="472" y="244" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#8b949e">wa.me/5519982569088</text>
  </g>

  <!-- LinkedIn -->
  <g class="fade11">
    <rect x="430" y="262" width="340" height="34" rx="6" fill="#161b22" stroke="#1a3a5c" stroke-width="0.5"/>
    <text x="446" y="284" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#58a6ff">in</text>
    <text x="472" y="284" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#8b949e">linkedin.com/in/nicolasluciani</text>
  </g>

  <!-- Gmail -->
  <g class="fade12">
    <rect x="430" y="302" width="340" height="34" rx="6" fill="#161b22" stroke="#3a1a1a" stroke-width="0.5"/>
    <text x="446" y="324" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#f78166">@</text>
    <text x="472" y="324" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#8b949e">nicolasluciani1603@gmail.com</text>
  </g>

  <!-- Instagram -->
  <g class="fade13">
    <rect x="430" y="342" width="340" height="34" rx="6" fill="#161b22" stroke="#3a1a2a" stroke-width="0.5"/>
    <text x="446" y="364" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#f778ba">ig</text>
    <text x="472" y="364" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#8b949e">@Nicolas_Lucianii</text>
  </g>

  <!-- Footer quote -->
  <g class="fade15">
    <text x="430" y="436" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#30363d" font-style="italic">"resolvo problemas com código — um commit por vez."</text>
  </g>
</svg>
